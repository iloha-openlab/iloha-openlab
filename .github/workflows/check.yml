name: Check Links

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md', '**/*.html', '**/*.astro') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --cache --verbose --no-progress --root-dir ./dist './dist/**/*.html'
          fail: true
