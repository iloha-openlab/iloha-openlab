<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">

    <!-- Outer Circle -->
    <circle cx="120" cy="120" r="90"
            fill="none"
            stroke="#1E2A38"
            stroke-width="6"/>

    <!-- Inner Equilateral Triangle -->
    <line x1="120" y1="55" x2="70" y2="155"
          stroke="#2E7D32"
          stroke-width="4"/>
    <line x1="70" y1="155" x2="170" y2="155"
          stroke="#2E7D32"
          stroke-width="4"/>
    <line x1="170" y1="155" x2="120" y2="55"
          stroke="#2E7D32"
          stroke-width="4"/>

    <!-- Nodes -->
    <circle cx="120" cy="55" r="7" fill="#2E7D32"/>
    <circle cx="70" cy="155" r="7" fill="#2E7D32"/>
    <circle cx="170" cy="155" r="7" fill="#2E7D32"/>

</svg>