<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        ILOHA OpenLab Logo
        - Hexagonal structure: Engineering foundations and stability.
        - Open segments: Commitment to Open Source and Open Data.
        - Colors: Professional Slate Blue (#0f172a) and Sustainable Emerald Green (#10b981).
    -->
    
    <!-- Outer structural arc (Foundation) -->
    <path d="M 190 80 V 160 L 120 200 L 50 160 V 80" 
          fill="none" 
          stroke="#0f172a" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Inner growth arc (Openness) -->
    <path d="M 160 100 L 120 75 L 80 100 V 140 L 120 165" 
          fill="none" 
          stroke="#10b981" 
          stroke-width="14" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Core fundamental node (Iroha) -->
    <circle cx="120" cy="120" r="12" fill="#10b981"/>
</svg>